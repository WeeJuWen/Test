<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Event Management - Hua Yan Amitabha Pure Land Learning Center</title>
    <link rel="icon" type="image/png" href="assets/images/華嚴logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/styles/styles.css">
    <script src="assets/scripts/languages.js"></script>
</head>
<body class="bg-stone-50 text-stone-800">
    <!-- Navigation -->
    <nav class="bg-black shadow-sm fixed w-full z-50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-baseline">
                    <a href="index.html" class="flex items-baseline hover:opacity-80 transition">
                        <span class="font-serif-sc text-xl font-semibold text-amber-400">華嚴净宗</span>
                        <span class="ml-2 text-sm text-white" data-i18n="admin.panel">Admin Panel</span>
                    </a>
                </div>
                <div class="hidden md:flex space-x-8 items-center">
                    <a href="index.html" class="nav-link text-white hover:text-amber-500" data-i18n="admin.back">Back to Website</a>
                    <button onclick="toggleLanguage()" class="bg-amber-500 text-white px-3 py-1 rounded hover:bg-amber-600 transition text-sm">
                        EN/中文
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Admin Section -->
    <section class="pt-24 pb-16">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-12">
                <h1 class="font-serif-sc text-3xl md:text-4xl font-bold text-amber-800 mb-4" data-i18n="admin.event_management">Event Management</h1>
                <div class="w-24 h-1 bg-amber-600 mx-auto"></div>
            </div>

            <!-- Add Event Form -->
            <div class="bg-white rounded-xl shadow-sm p-8 mb-8">
                <h2 class="font-serif-sc text-xl font-semibold text-amber-800 mb-6" data-i18n="admin.add_event">Add New Event</h2>
                <form id="event-form">
                    <div class="mb-4">
                        <label class="block text-stone-700 font-medium mb-2" data-i18n="admin.event_title">Event Title</label>
                        <input type="text" id="event-title" required class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500">
                    </div>
                    <div class="mb-4">
                        <label class="block text-stone-700 font-medium mb-2" data-i18n="admin.date">Date</label>
                        <input type="date" id="event-date" required class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500">
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-stone-700 font-medium mb-2" data-i18n="admin.start_time">Start Time</label>
                            <input type="time" id="event-start-time" required class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500">
                        </div>
                        <div>
                            <label class="block text-stone-700 font-medium mb-2" data-i18n="admin.end_time">End Time</label>
                            <input type="time" id="event-end-time" required class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="block text-stone-700 font-medium mb-2" data-i18n="admin.location">Location</label>
                        <input type="text" id="event-location" required class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500">
                    </div>
                    <div class="mb-4">
                        <label class="block text-stone-700 font-medium mb-2" data-i18n="admin.description">Description</label>
                        <textarea id="event-description" rows="4" required class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500"></textarea>
                    </div>
                    <div class="mb-4">
                        <label class="block text-stone-700 font-medium mb-2" data-i18n="admin.pdf_optional">Event Details PDF (Optional)</label>
                        <div id="pdf-dropzone" class="border-2 border-dashed border-stone-300 rounded-lg p-6 text-center hover:border-amber-500 hover:bg-amber-50 transition cursor-pointer">
                            <input type="file" id="event-pdf" accept=".pdf" class="hidden">
                            <svg class="w-10 h-10 mx-auto text-stone-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                            </svg>
                            <p class="text-sm text-stone-600" data-i18n="admin.drag_drop">Drag and drop PDF here or click to browse</p>
                            <p class="text-xs text-stone-500 italic mt-1" data-i18n="admin.pdf_hint">Upload a PDF file with additional event details</p>
                            <p id="pdf-filename" class="text-sm text-amber-600 font-medium mt-2 hidden"></p>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-amber-600 text-white px-6 py-3 rounded-lg hover:bg-amber-700 transition font-medium" data-i18n="admin.add_event_btn">
                        Add Event
                    </button>
                </form>
            </div>

            <!-- Live Stream Management -->
            <div class="bg-white rounded-xl shadow-sm p-8 mb-8">
                <h2 class="font-serif-sc text-xl font-semibold text-amber-800 mb-6" data-i18n="admin.livestream_management">Live Stream Management</h2>
                <div class="mb-4">
                    <label class="flex items-center mb-4">
                        <input type="checkbox" id="stream-active" class="mr-2">
                        <span class="text-stone-700 font-medium" data-i18n="admin.enable_livestream">Enable Live Stream</span>
                    </label>
                </div>
                <div class="mb-4">
                    <label class="block text-stone-700 font-medium mb-2" data-i18n="admin.youtube_video_id">YouTube Video ID</label>
                    <input type="text" id="stream-video-id" placeholder="e.g., dQw4w9WgXcQ" class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500">
                    <p class="text-xs text-stone-500 italic mt-1 px-2" data-i18n="admin.youtube_hint">Enter the YouTube video ID (the part after v= in the URL)</p>
                </div>
                <button onclick="saveStreamConfig()" class="w-full bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition font-medium" data-i18n="admin.save_stream_config">
                    Save Stream Configuration
                </button>
            </div>

            <!-- Existing Events -->
            <div class="bg-white rounded-xl shadow-sm p-8">
                <h2 class="font-serif-sc text-xl font-semibold text-amber-800 mb-6" data-i18n="admin.existing_events">Existing Events</h2>
                <div id="admin-events-container" class="space-y-4">
                    <!-- Events will be loaded here -->
                </div>
                <div id="no-admin-events" class="text-center text-stone-600 py-8 hidden">
                    <p data-i18n="admin.no_events">No events found.</p>
                </div>
            </div>
        </div>
    </section>

    <script src="assets/scripts/admin-script.js"></script>
</body>
</html>
